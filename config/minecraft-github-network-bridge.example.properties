# 我的世界 Minecraft GitHub 网络桥接公开样例。
# 不要公开真实订阅链接。
enabled=true
profileName=Minecraft GitHub
profileDescription=
subscriptionUrl=
selectedProxyName=
subscriptionUserAgent=clash.meta
subscriptionTimeoutSeconds=15
subscriptionUpdateMinutes=360
subscriptionUseCurrentProxy=true
subscriptionAllowInsecure=false
subscriptionAutoUpdate=true

# 内置连接只监听 127.0.0.1，并且只使用一个本地端口。
# 若端口被 Clash 或其他程序占用，Mod 会自动选择并保存空闲端口。
localProxyPort=17897
githubDomains=github.com,api.github.com,codeload.github.com,raw.githubusercontent.com,objects.githubusercontent.com,release-assets.githubusercontent.com,githubusercontent.com,githubassets.com,github.io
startupTimeoutSeconds=20
testUrl=https://api.github.com/rate_limit
connectTimeoutSeconds=10
